<style>
:root {
  --deep-navy: #1A2A3A; --navy: #2A3D4F; --gold: #FFB64D; --orange: #E8713A; --orange-dark: #D4622E;
  --near-black: #1C1E22; --dark-gray: #3D4550; --medium-gray: #6B7785; --light-gray: #B0B8C1;
  --border-gray: #DFE2E6; --section-gray: #F2F3F5; --warm-white: #FAFAF8; --pure-white: #FFFFFF;
  --font-display: 'DM Serif Display', Georgia, serif; --font-body: 'DM Sans', system-ui, sans-serif;
  --section-pad: clamp(4rem, 8vw, 7rem); --container: min(1200px, 90vw);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body { font-family: var(--font-body); font-size: 18px; line-height: 1.7; color: var(--dark-gray); background: var(--warm-white); }
a { text-decoration: none; color: inherit; }
.container { width: var(--container); margin: 0 auto; }

.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--deep-navy); border-bottom: 1px solid rgba(255,255,255,0.06); }
.nav-inner { width: var(--container); margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 1rem 0; gap: 2rem; }
.nav-logo { display: flex; align-items: center; gap: 0.65rem; font-family: var(--font-body); font-weight: 600; font-size: 1.05rem; color: var(--warm-white); }
.nav-logo svg { width: auto; height: 28px; }
.nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }
.nav-links a { color: var(--light-gray); font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
.nav-links a:hover { color: var(--gold); }
.nav-cta { background: var(--gold); color: var(--navy); font-weight: 700; padding: 0.6rem 1.4rem; border-radius: 6px; font-size: 0.85rem; transition: background 0.2s, transform 0.15s; border: none; cursor: pointer; }
.nav-cta:hover { background: var(--orange); color: var(--pure-white); transform: translateY(-1px); }
.nav-hamburger { display: none; background: none; border: none; cursor: pointer; padding: 0.5rem; }
.nav-hamburger span { display: block; width: 22px; height: 2px; background: var(--warm-white); margin: 5px 0; }

.page-header { background: var(--deep-navy); padding: calc(var(--section-pad) + 4rem) 0 3rem; }
.page-header h1 { font-family: var(--font-display); font-size: clamp(2rem, 4vw, 2.8rem); color: var(--warm-white); }
.page-header p { font-size: 0.88rem; color: var(--medium-gray); margin-top: 0.5rem; }

.policy { padding: var(--section-pad) 0; background: var(--warm-white); }
.policy-inner { max-width: 720px; margin: 0 auto; }
.policy h2 { font-family: var(--font-display); font-size: 1.3rem; color: var(--near-black); margin-top: 2.5rem; margin-bottom: 0.75rem; }
.policy h2:first-child { margin-top: 0; }
.policy p { margin-bottom: 1rem; font-size: 0.95rem; }
.policy a { color: var(--gold); font-weight: 500; transition: color 0.2s; }
.policy a:hover { color: var(--orange); }

.footer { background: var(--near-black); padding: 4rem 0 2rem; border-top: 1px solid rgba(255,255,255,0.06); }
.footer-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 3rem; margin-bottom: 3rem; }
.footer-brand h3 { font-family: var(--font-body); font-weight: 600; color: var(--warm-white); font-size: 1rem; margin-bottom: 0.5rem; }
.footer-brand p { font-size: 0.82rem; color: var(--medium-gray); line-height: 1.6; }
.footer-links h4, .footer-contact h4 { font-size: 0.78rem; color: var(--light-gray); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; font-weight: 600; }
.footer-links a, .footer-contact a { display: block; font-size: 0.88rem; color: var(--medium-gray); padding: 0.25rem 0; transition: color 0.2s; }
.footer-links a:hover, .footer-contact a:hover { color: var(--gold); }
.footer-bottom { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 1.5rem; display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; color: var(--medium-gray); }
.footer-bottom a { color: var(--medium-gray); transition: color 0.2s; }
.footer-bottom a:hover { color: var(--gold); }

@media (max-width: 768px) {
  body { font-size: 16px; }
  .nav-links { display: none; }
  .nav-hamburger { display: block; }
  .nav-inner .nav-cta { display: none; }
  .footer-grid { grid-template-columns: 1fr; }
  .footer-bottom { flex-direction: column; gap: 0.5rem; text-align: center; }
}

/* SERVICES DROPDOWN */
.nav-dropdown-wrap { position: relative; }
.nav-dropdown-trigger { cursor: pointer; }
.nav-dropdown {
  position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
  background: var(--deep-navy); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; padding: 0.5rem 0; min-width: 220px;
  opacity: 0; visibility: hidden; pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  transform: translateX(-50%) translateY(8px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  margin-top: 0.5rem;
}
.nav-dropdown-wrap:hover .nav-dropdown {
  opacity: 1; visibility: visible; pointer-events: auto;
  transform: translateX(-50%) translateY(0);
}
.nav-dropdown a {
  display: block; padding: 0.5rem 1.25rem; font-size: 0.85rem;
  color: var(--light-gray); transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}
.nav-dropdown a:hover { background: rgba(255,182,77,0.1); color: var(--gold); }
.nav-dropdown-all {
  border-top: 1px solid rgba(255,255,255,0.08); margin-top: 0.25rem;
  padding-top: 0.6rem; font-weight: 600; font-size: 0.82rem;
}

/* MOBILE MENU OPEN STATE */
.nav-links.nav-open {
  display: flex; flex-direction: column;
  position: absolute; top: 100%; left: 0; right: 0;
  background: var(--deep-navy); padding: 1rem 5vw 1.5rem;
  border-top: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  gap: 0; z-index: 100;
}
.nav-links.nav-open li { padding: 0.5rem 0; }
.nav-links.nav-open a { font-size: 1rem; }
.nav-links.nav-open .nav-dropdown {
  position: static; transform: none; opacity: 1; visibility: visible;
  pointer-events: auto; box-shadow: none; border: none;
  padding: 0 0 0 1rem; margin-top: 0.25rem; min-width: 0;
  background: transparent;
}
.nav-hamburger-open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
.nav-hamburger-open span:nth-child(2) { opacity: 0; }
.nav-hamburger-open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
</style>
