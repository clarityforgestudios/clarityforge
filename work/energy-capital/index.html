<title>Energy Capital Podcast Case Study | ClarityForge Studios</title>
<meta name="description" content="How ClarityForge helped the Energy Capital Podcast double downloads, reach millions, and build a multi-platform media ecosystem for Texas energy policy.">

<style>
:root {
  --deep-navy: #1A2A3A; --navy: #2A3D4F; --gold: #FFB64D; --orange: #E8713A; --orange-dark: #D4622E;
  --near-black: #1C1E22; --dark-gray: #3D4550; --medium-gray: #6B7785; --light-gray: #B0B8C1;
  --border-gray: #DFE2E6; --section-gray: #F2F3F5; --warm-white: #FAFAF8; --pure-white: #FFFFFF;
  --font-display: 'DM Serif Display', Georgia, serif; --font-body: 'DM Sans', system-ui, sans-serif;
  --section-pad: clamp(4rem, 8vw, 7rem); --container: min(1200px, 90vw);
  --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body { font-family: var(--font-body); font-size: 18px; line-height: 1.7; color: var(--dark-gray); background: var(--warm-white); }
img { max-width: 100%; display: block; } a { text-decoration: none; color: inherit; }
.container { width: var(--container); margin: 0 auto; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
.anim-entry { opacity: 0; animation: fadeUp 0.7s var(--ease) forwards; }
.anim-d1 { animation-delay: 0ms; } .anim-d2 { animation-delay: 150ms; } .anim-d3 { animation-delay: 300ms; }

.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--deep-navy); border-bottom: 1px solid rgba(255,255,255,0.06); }
.nav-inner { width: var(--container); margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 1rem 0; gap: 2rem; }
.nav-logo { display: flex; align-items: center; gap: 0.65rem; font-family: var(--font-body); font-weight: 600; font-size: 1.05rem; color: var(--warm-white); }
.nav-logo svg { width: auto; height: 28px; }
.nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }
.nav-links a { color: var(--light-gray); font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
.nav-links a:hover { color: var(--gold); }
.nav-cta { background: var(--gold); color: var(--navy); font-weight: 700; padding: 0.6rem 1.4rem; border-radius: 6px; font-size: 0.85rem; transition: background 0.2s, transform 0.15s; border: none; cursor: pointer; }
.nav-cta:hover { background: var(--orange); color: var(--pure-white); transform: translateY(-1px); }
.nav-hamburger { display: none; background: none; border: none; cursor: pointer; padding: 0.5rem; }
.nav-hamburger span { display: block; width: 22px; height: 2px; background: var(--warm-white); margin: 5px 0; }

/* CASE HERO */
.case-hero { background: var(--deep-navy); padding: calc(var(--section-pad) + 4rem) 0 var(--section-pad); position: relative; overflow: hidden; }
.case-hero::after { content: ''; position: absolute; top: 0; right: 0; width: 40%; height: 100%; background: radial-gradient(ellipse at 80% 40%, rgba(255,182,77,0.06) 0%, transparent 70%); pointer-events: none; }
.case-hero-inner { position: relative; z-index: 2; }
.case-hero-back { font-size: 0.82rem; color: var(--light-gray); margin-bottom: 2rem; display: inline-flex; align-items: center; gap: 0.4rem; transition: color 0.2s; }
.case-hero-back:hover { color: var(--gold); }
.case-hero-back::before { content: '\2190'; }
.case-hero-lane { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--gold); margin-bottom: 0.75rem; }
.case-hero h1 { font-family: var(--font-display); font-size: clamp(2.4rem, 5vw, 3.6rem); color: var(--warm-white); line-height: 1.2; margin-bottom: 1rem; max-width: 720px; }
.case-hero-sub { font-size: clamp(1rem, 1.8vw, 1.15rem); color: var(--light-gray); max-width: 600px; line-height: 1.65; }

/* METRICS BAND */
.metrics-band { padding: 3rem 0; background: var(--navy); }
.metrics-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1.5rem; }
.metric-card { text-align: center; }
.metric-card-number { font-family: var(--font-display); font-size: clamp(1.8rem, 3.5vw, 2.6rem); color: var(--gold); line-height: 1; margin-bottom: 0.3rem; }
.metric-card-label { font-size: 0.75rem; color: var(--light-gray); line-height: 1.3; }

/* NARRATIVE SECTIONS */
.case-section { padding: var(--section-pad) 0; }
.case-section-light { background: var(--warm-white); }
.case-section-gray { background: var(--section-gray); }
.case-section h2 { font-family: var(--font-display); font-size: clamp(1.6rem, 3vw, 2.2rem); color: var(--near-black); margin-bottom: 1.5rem; }
.case-section p { max-width: 720px; margin-bottom: 1.2rem; }
.case-section p:last-of-type { margin-bottom: 0; }

/* CLIENT INFO */
.client-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; max-width: 900px; }
.client-detail-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold); margin-bottom: 0.4rem; }
.client-detail-value { font-size: 0.95rem; color: var(--near-black); font-weight: 500; margin-bottom: 1.25rem; }
.client-detail-value:last-child { margin-bottom: 0; }

/* PIPELINE VISUAL */
.pipeline-flow { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0; max-width: 960px; margin: 2rem 0; position: relative; }
.pipeline-flow::before { content: ''; position: absolute; top: 24px; left: 8%; right: 8%; height: 3px; background: var(--border-gray); z-index: 1; }
.pipeline-step { text-align: center; position: relative; z-index: 2; padding: 0 0.25rem; }
.pipeline-dot { width: 48px; height: 48px; border-radius: 50%; margin: 0 auto 0.75rem; display: flex; align-items: center; justify-content: center; font-family: var(--font-body); font-weight: 700; font-size: 0.85rem; color: var(--pure-white); background: var(--navy); }
.pipeline-step:last-child .pipeline-dot { background: var(--gold); color: var(--navy); }
.pipeline-step-label { font-size: 0.72rem; font-weight: 600; color: var(--near-black); line-height: 1.3; }

/* RESULTS CARDS */
.results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; max-width: 960px; margin-top: 2rem; }
.result-card { background: var(--pure-white); border-radius: 10px; padding: 2rem 1.5rem; border: 1px solid var(--border-gray); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.result-card-number { font-family: var(--font-display); font-size: 1.8rem; color: var(--gold); line-height: 1; margin-bottom: 0.4rem; }
.result-card-label { font-size: 0.85rem; color: var(--dark-gray); line-height: 1.4; }

/* EVOLUTION TIMELINE */
.evolution { padding: var(--section-pad) 0; background: var(--section-gray); }
.evolution h2 { font-family: var(--font-display); font-size: clamp(1.6rem, 3vw, 2.2rem); color: var(--near-black); margin-bottom: 1rem; }
.evolution > .container > p { max-width: 720px; margin-bottom: 2.5rem; }
.evo-phases { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; max-width: 900px; }
.evo-card { border-radius: 10px; padding: 2.5rem 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.evo-card-before { background: rgba(42,61,79,0.06); border: 1px solid var(--border-gray); }
.evo-card-after { background: rgba(255,182,77,0.06); border: 1px solid rgba(255,182,77,0.2); }
.evo-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 1rem; }
.evo-card-before .evo-label { color: var(--medium-gray); }
.evo-card-after .evo-label { color: var(--gold); }
.evo-card h3 { font-family: var(--font-display); font-size: 1.15rem; color: var(--near-black); margin-bottom: 0.75rem; }
.evo-card-after h3 { color: var(--navy); }
.evo-list { list-style: none; }
.evo-list li { padding: 0.35rem 0 0.35rem 1.4rem; position: relative; font-size: 0.85rem; color: var(--dark-gray); line-height: 1.45; }
.evo-list li::before { content: ''; position: absolute; left: 0; top: 0.65rem; width: 7px; height: 7px; border-radius: 50%; }
.evo-card-before .evo-list li::before { background: var(--light-gray); }
.evo-card-after .evo-list li::before { background: var(--gold); }
.evo-tier { margin-top: 1rem; font-size: 0.78rem; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.08em; }

/* MULTI-FORMAT SECTION */
.formats { padding: var(--section-pad) 0; background: var(--warm-white); }
.formats h2 { font-family: var(--font-display); font-size: clamp(1.6rem, 3vw, 2.2rem); color: var(--near-black); margin-bottom: 1rem; }
.formats > .container > p { max-width: 720px; margin-bottom: 2rem; }
.formats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; max-width: 960px; }
.format-card { background: var(--pure-white); border-radius: 10px; padding: 1.5rem; border: 1px solid var(--border-gray); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.format-card-icon { width: 36px; height: 36px; color: var(--gold); margin-bottom: 0.75rem; }
.format-card h3 { font-family: var(--font-body); font-size: 0.92rem; font-weight: 700; color: var(--near-black); margin-bottom: 0.3rem; }
.format-card p { font-size: 0.82rem; color: var(--dark-gray); line-height: 1.45; }

/* DISTRIBUTION BAND */
.distro-band { padding: 2.5rem 0; background: var(--navy); }
.distro-inner { display: flex; align-items: center; justify-content: center; gap: 0; flex-wrap: wrap; }
.distro-item { text-align: center; padding: 0 1.5rem; border-right: 1px solid rgba(255,255,255,0.12); }
.distro-item:last-child { border-right: none; }
.distro-item-name { font-size: 0.92rem; font-weight: 600; color: var(--warm-white); letter-spacing: 0.02em; }

/* WHERE THEY ARE NOW */
.where-now { padding: var(--section-pad) 0; background: var(--section-gray); }
.where-now h2 { font-family: var(--font-display); font-size: clamp(1.6rem, 3vw, 2.2rem); color: var(--near-black); margin-bottom: 1.5rem; }
.where-now p { color: var(--dark-gray); max-width: 720px; margin-bottom: 1.2rem; line-height: 1.6; }

/* CTA */
.closing-cta { padding: var(--section-pad) 0; background: var(--warm-white); text-align: center; }
.closing-cta h2 { font-family: var(--font-display); font-size: clamp(1.6rem, 3vw, 2.2rem); color: var(--near-black); margin-bottom: 2rem; max-width: 560px; margin-left: auto; margin-right: auto; }
.btn-primary { display: inline-flex; align-items: center; gap: 0.5rem; background: var(--gold); color: var(--navy); font-weight: 700; padding: 0.9rem 2rem; border-radius: 6px; font-size: 1rem; transition: background 0.25s, transform 0.15s, box-shadow 0.25s; box-shadow: 0 2px 12px rgba(255,182,77,0.2); }
.btn-primary:hover { background: var(--orange); color: var(--pure-white); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(232,113,58,0.3); }
.closing-micro { margin-top: 1.25rem; font-size: 0.82rem; color: var(--medium-gray); }

.footer { background: var(--near-black); padding: 4rem 0 2rem; border-top: 1px solid rgba(255,255,255,0.06); }
.footer-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 3rem; margin-bottom: 3rem; }
.footer-brand h3 { font-family: var(--font-body); font-weight: 600; color: var(--warm-white); font-size: 1rem; margin-bottom: 0.5rem; }
.footer-brand p { font-size: 0.82rem; color: var(--medium-gray); line-height: 1.6; }
.footer-links h4, .footer-contact h4 { font-size: 0.78rem; color: var(--light-gray); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; font-weight: 600; }
.footer-links a, .footer-contact a { display: block; font-size: 0.88rem; color: var(--medium-gray); padding: 0.25rem 0; transition: color 0.2s; }
.footer-links a:hover, .footer-contact a:hover { color: var(--gold); }
.footer-bottom { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 1.5rem; display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; color: var(--medium-gray); }
.footer-bottom a { color: var(--medium-gray); transition: color 0.2s; }
.footer-bottom a:hover { color: var(--gold); }
.mobile-cta { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--deep-navy); padding: 0.75rem 1rem; border-top: 2px solid var(--gold); z-index: 99; text-align: center; }
.mobile-cta .btn-primary { width: 100%; justify-content: center; font-size: 0.95rem; padding: 0.8rem; }

@media (max-width: 960px) {
  .metrics-grid { grid-template-columns: repeat(3, 1fr); }
  .client-grid { grid-template-columns: 1fr; }
  .pipeline-flow { grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
  .pipeline-flow::before { display: none; }
  .results-grid { grid-template-columns: 1fr; max-width: 400px; }
  .evo-phases { grid-template-columns: 1fr; }
  .formats-grid { grid-template-columns: 1fr; max-width: 400px; }
  .footer-grid { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  body { font-size: 16px; }
  .nav-links { display: none; }
  .nav-hamburger { display: block; }
  .nav-inner .nav-cta { display: none; }
  .mobile-cta { display: block; }
  body { padding-bottom: 60px; }
  .metrics-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
  .pipeline-flow { grid-template-columns: repeat(2, 1fr); }
  .distro-inner { gap: 1.5rem; }
  .footer-bottom { flex-direction: column; gap: 0.5rem; text-align: center; }
}

/* SERVICES DROPDOWN */
.nav-dropdown-wrap { position: relative; }
.nav-dropdown-trigger { cursor: pointer; }
.nav-dropdown {
  position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
  background: var(--deep-navy); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; padding: 0.5rem 0; min-width: 220px;
  opacity: 0; visibility: hidden; pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  transform: translateX(-50%) translateY(8px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  margin-top: 0.5rem;
}
.nav-dropdown-wrap:hover .nav-dropdown {
  opacity: 1; visibility: visible; pointer-events: auto;
  transform: translateX(-50%) translateY(0);
}
.nav-dropdown a {
  display: block; padding: 0.5rem 1.25rem; font-size: 0.85rem;
  color: var(--light-gray); transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}
.nav-dropdown a:hover { background: rgba(255,182,77,0.1); color: var(--gold); }
.nav-dropdown-all {
  border-top: 1px solid rgba(255,255,255,0.08); margin-top: 0.25rem;
  padding-top: 0.6rem; font-weight: 600; font-size: 0.82rem;
}

/* MOBILE MENU OPEN STATE */
.nav-links.nav-open {
  display: flex; flex-direction: column;
  position: absolute; top: 100%; left: 0; right: 0;
  background: var(--deep-navy); padding: 1rem 5vw 1.5rem;
  border-top: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  gap: 0; z-index: 100;
}
.nav-links.nav-open li { padding: 0.5rem 0; }
.nav-links.nav-open a { font-size: 1rem; }
.nav-links.nav-open .nav-dropdown {
  position: static; transform: none; opacity: 1; visibility: visible;
  pointer-events: auto; box-shadow: none; border: none;
  padding: 0 0 0 1rem; margin-top: 0.25rem; min-width: 0;
  background: transparent;
}
.nav-hamburger-open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
.nav-hamburger-open span:nth-child(2) { opacity: 0; }
.nav-hamburger-open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
